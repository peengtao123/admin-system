<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>流程定义</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>流程定义</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>名称</th>
                <th>版本</th>
                <th>部署ID</th>
                <th>资源名称</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="processDefinition : ${processDefinitions}">
                <td th:text="${processDefinition.id}"></td>
                <td th:text="${processDefinition.name}"></td>
                <td th:text="${processDefinition.version}"></td>
                <td th:text="${processDefinition.deploymentId}"></td>
                <td th:text="${processDefinition.resourceName}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
