<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户表单</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">后台管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/users">用户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/departments">部门管理</a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button type="submit" class="btn btn-outline-light">退出登录</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 th:text="${user.id != null ? '编辑用户' : '添加用户'}"></h2>
        <form th:action="@{/users}" method="post">
            <input type="hidden" th:field="${user.id}">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" th:field="${user.username}" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" th:field="${user.password}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">角色</label>
                <div class="row">
                    <div class="col-md-12">
                        <th:block th:each="role : ${roles}">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" 
                                       th:id="'role-' + ${role.id}" 
                                       th:name="roleIds" 
                                       th:value="${role.id}" 
                                       th:checked="${user.roles != null && user.roles.contains(role)}">
                                <label th:for="'role-' + ${role.id}" class="form-check-label">
                                    [[${role.name}]]
                                </label>
                            </div>
                        </th:block>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label for="departmentId" class="form-label">部门</label>
                <select class="form-select" id="departmentId" th:field="${user.departmentId}" required>
                    <option th:each="dept : ${departments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/users" class="btn btn-secondary">取消</a>
        </form>
    </div>
</body>
</html>
