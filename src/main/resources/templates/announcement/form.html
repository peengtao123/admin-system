<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>公告管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        form {
            max-width: 600px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        textarea {
            height: 150px;
        }
        .submit-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .cancel-button {
            padding: 10px 20px;
            background-color: #f2f2f2;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1 th:if="${announcement.id == null}">添加公告</h1>
    <h1 th:if="${announcement.id != null}">编辑公告</h1>
    <form th:action="@{/announcement/save}" th:object="${announcement}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label for="title">标题</label>
            <input type="text" id="title" th:field="*{title}" required />
        </div>
        <div class="form-group">
            <label for="content">内容</label>
            <textarea id="content" th:field="*{content}"></textarea>
        </div>
        <div class="form-group">
            <label for="type">类型</label>
            <select id="type" th:field="*{type}">
                <option value="global">全局公告</option>
                <option value="popup">弹窗通知</option>
            </select>
        </div>
        <div class="form-group">
            <label for="status">状态</label>
            <select id="status" th:field="*{status}">
                <option value="active">激活</option>
                <option value="inactive">未激活</option>
            </select>
        </div>
        <button type="submit" class="submit-button">保存</button>
        <a href="/announcement/list" class="cancel-button">取消</a>
    </form>
</body>
</html>
