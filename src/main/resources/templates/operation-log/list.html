<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>操作日志</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">操作日志</h1>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>操作</th>
                    <th>方法</th>
                    <th>参数</th>
                    <th>IP</th>
                    <th>操作时间</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.id}"></td>
                    <td th:text="${log.username}"></td>
                    <td th:text="${log.operation}"></td>
                    <td th:text="${log.method}"></td>
                    <td th:text="${log.params}"></td>
                    <td th:text="${log.ip}"></td>
                    <td th:text="${log.createTime}"></td>
                </tr>
            </tbody>
        </table>
        <div class="pagination">
            <th:block th:if="${logs.hasPrevious()}">
                <a href="/operation-log/list?page=${logs.previousPageable().getPageNumber()}&size=${pageSize}" class="btn btn-sm btn-outline-secondary">上一页</a>
            </th:block>
            <span class="mx-2">第 ${logs.getNumber() + 1} 页，共 ${logs.getTotalPages()} 页</span>
            <th:block th:if="${logs.hasNext()}">
                <a href="/operation-log/list?page=${logs.nextPageable().getPageNumber()}&size=${pageSize}" class="btn btn-sm btn-outline-secondary">下一页</a>
            </th:block>
        </div>
    </div>
</body>
</html>
