<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>菜单管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">菜单管理</h1>
        <div class="mb-3">
            <a href="/permission/form" class="btn btn-primary">添加权限</a>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>编码</th>
                    <th>类型</th>
                    <th>父菜单</th>
                    <th>URL</th>
                    <th>排序</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="permission : ${permissions}">
                    <td th:text="${permission.id}"></td>
                    <td th:text="${permission.name}"></td>
                    <td th:text="${permission.code}"></td>
                    <td th:text="${permission.type == 'menu' ? '菜单' : '按钮'}"></td>
                    <td th:text="${permission.parentId != null ? permissionService.findById(permission.parentId).name : '无'}"></td>
                    <td th:text="${permission.url}"></td>
                    <td th:text="${permission.orderNum}"></td>
                    <td>
                        <a href="/permission/form?id=${permission.id}" class="btn btn-sm btn-info">编辑</a>
                        <a href="/permission/delete/${permission.id}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="pagination">
            <th:block th:if="${permissions.hasPrevious()}">
                <a href="/permission/list?page=${permissions.previousPageable().getPageNumber()}&size=${pageSize}" class="btn btn-sm btn-outline-secondary">上一页</a>
            </th:block>
            <span class="mx-2">第 ${permissions.getNumber() + 1} 页，共 ${permissions.getTotalPages()} 页</span>
            <th:block th:if="${permissions.hasNext()}">
                <a href="/permission/list?page=${permissions.nextPageable().getPageNumber()}&size=${pageSize}" class="btn btn-sm btn-outline-secondary">下一页</a>
            </th:block>
        </div>
    </div>
</body>
</html>
