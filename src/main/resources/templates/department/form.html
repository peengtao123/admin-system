<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>部门表单</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">后台管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/users">用户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/departments">部门管理</a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button type="submit" class="btn btn-outline-light">退出登录</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 th:text="${department.id != null ? '编辑部门' : '添加部门'}"></h2>
        <form th:action="@{/departments}" method="post">
            <input type="hidden" th:field="${department.id}">
            <div class="mb-3">
                <label for="name" class="form-label">部门名称</label>
                <input type="text" class="form-control" id="name" th:field="${department.name}" required>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/departments" class="btn btn-secondary">取消</a>
        </form>
    </div>
</body>
</html>
