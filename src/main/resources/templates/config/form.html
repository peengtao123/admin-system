<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>配置管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        form {
            max-width: 600px;
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        textarea {
            height: 100px;
        }
        .submit-button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .cancel-button {
            padding: 10px 20px;
            background-color: #f2f2f2;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1 th:if="${config.id == null}">添加配置</h1>
    <h1 th:if="${config.id != null}">编辑配置</h1>
    <form th:action="@{/config/save}" th:object="${config}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label for="configKey">键</label>
            <input type="text" id="configKey" th:field="*{configKey}" required />
        </div>
        <div class="form-group">
            <label for="configValue">值</label>
            <input type="text" id="configValue" th:field="*{configValue}" />
        </div>
        <div class="form-group">
            <label for="description">描述</label>
            <textarea id="description" th:field="*{description}"></textarea>
        </div>
        <button type="submit" class="submit-button">保存</button>
        <a href="/config/list" class="cancel-button">取消</a>
    </form>
</body>
</html>
