<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>角色管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">角色管理</h1>
        <div class="mb-3">
            <a href="/role/form" class="btn btn-primary">添加角色</a>
        </div>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>角色名称</th>
                    <th>描述</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="role : ${roles}">
                    <td th:text="${role.id}"></td>
                    <td th:text="${role.name}"></td>
                    <td th:text="${role.description}"></td>
                    <td>
                        <a th:href="@{/role/form/{id}(id=${role.id})}" class="btn btn-sm btn-info">编辑</a>
                        <a th:href="@{/role/delete/{id}(id=${role.id})}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除吗？')">删除</a>
                        <a th:href="@{/role/permission/{id}(id=${role.id})}" class="btn btn-sm btn-secondary">权限分配</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="pagination">
            <th:block th:if="${roles.hasPrevious()}">
                <a href="/role/list?page=${roles.previousPageable().getPageNumber()}&size=${pageSize}" class="btn btn-sm btn-outline-secondary">上一页</a>
            </th:block>
            <span class="mx-2">第 ${roles.getNumber() + 1} 页，共 ${roles.getTotalPages()} 页</span>
            <th:block th:if="${roles.hasNext()}">
                <a href="/role/list?page=${roles.nextPageable().getPageNumber()}&size=${pageSize}" class="btn btn-sm btn-outline-secondary">下一页</a>
            </th:block>
        </div>
    </div>
</body>
</html>
