<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>权限分配</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">权限分配 - [[${role.name}]]</h1>
        <form th:action="/role/permission/save" method="post">
            <input type="hidden" name="roleId" th:value="${role.id}">
            <div class="mb-3">
                <h3>菜单权限</h3>
                <div class="row">
                    <div class="col-md-12">
                        <th:block th:each="permission : ${permissions}">
                            <th:block th:if="${permission.type == 'menu'}">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" 
                                           th:id="'permission-' + ${permission.id}" 
                                           th:name="permissionIds" 
                                           th:value="${permission.id}" 
                                           th:checked="${role.permissions.contains(permission)}">
                                    <label th:for="'permission-' + ${permission.id}" class="form-check-label">
                                        [[${permission.name}]]
                                    </label>
                                </div>
                                <div class="pl-4 ml-4">
                                    <th:block th:each="subPermission : ${permissions}">
                                        <th:block th:if="${subPermission.type == 'button' && subPermission.parentId == permission.id}">
                                            <div class="form-check">
                                                <input type="checkbox" class="form-check-input" 
                                                       th:id="'permission-' + ${subPermission.id}" 
                                                       th:name="permissionIds" 
                                                       th:value="${subPermission.id}" 
                                                       th:checked="${role.permissions.contains(subPermission)}">
                                                <label th:for="'permission-' + ${subPermission.id}" class="form-check-label">
                                                    [[${subPermission.name}]]
                                                </label>
                                            </div>
                                        </th:block>
                                    </th:block>
                                </div>
                            </th:block>
                        </th:block>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/role/list" class="btn btn-secondary">取消</a>
        </form>
    </div>
</body>
</html>
